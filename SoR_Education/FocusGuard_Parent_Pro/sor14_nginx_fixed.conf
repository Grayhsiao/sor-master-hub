server {
    server_name sor14.duckdns.org;

    # === 1. 音典 API (優先匹配) ===
    location ^~ /phonics/api/ {
        proxy_pass http://127.0.0.1:5055/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # === 2. Focus Guard Pro API ===
    location /focus_pro/ {
        proxy_pass http://localhost:5100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /focus_pro {
        return 301 /focus_pro/;
    }

    # === 3. 其他子目錄與應用 ===

    # 製作室 (Streamlit)
    location /studio {
        proxy_pass http://localhost:8501/studio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 猜歌/歌曲教材
    location /song/ {
        proxy_pass http://localhost:5088/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /song {
        return 301 /song/;
    }

    # 音典 靜態頁面
    location /phonics/ {
        alias /var/www/sor_hub/static/phonics/;
        index index.html;
    }

    # 國中智慧王 (PHP)
    location ^~ /king/ {
        alias /var/www/sor_hub/junior_high_king/;
        index index.php index.html;
        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }
    location = /king {
        return 301 /king/;
    }

    # YouTube 知識庫 (Streamlit)
    location /youtubedb {
        proxy_pass http://localhost:8502/youtubedb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # === 4. 預設首頁 (SoR Hub) ===
    location / {
        proxy_pass http://localhost:8503;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # === 5. SSL 安全設定 ===
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sor14.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sor14.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
}
