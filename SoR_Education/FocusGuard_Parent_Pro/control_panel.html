<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Guard Pro - 簡易控制台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0f172a;
        --card: rgba(255, 255, 255, 0.05);
        --primary: #818cf8;
        --success: #34d399;
        --danger: #f87171;
        --text: #f8fafc;
        --subtext: #94a3b8;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
        font-family:'Inter','Noto Sans TC',sans-serif;
        background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        min-height:100vh;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .container {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        padding: 32px;
        backdrop-filter: blur(20px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .header {
        text-align: center;
        margin-bottom: 32px;
    }
    .header h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: -0.5px;
    }
    .header p {
        font-size: 0.85rem;
        color: var(--subtext);
        margin-top: 4px;
    }
    .id-badge {
        display: inline-block;
        margin-top: 12px;
        padding: 6px 16px;
        background: rgba(129, 140, 248, 0.1);
        border: 1px solid rgba(129, 140, 248, 0.2);
        border-radius: 100px;
        font-size: 0.8rem;
        color: var(--primary);
        font-weight: 600;
        cursor: pointer;
    }
    .status-card {
        background: rgba(0,0,0,0.2);
        border-radius: 20px;
        padding: 24px;
        text-align: center;
        margin-bottom: 24px;
    }
    .status-icon {
        width: 64px;
        height: 64px;
        background: rgba(255,255,255,0.05);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 24px;
        transition: 0.3s;
    }
    .status-icon.active {
        background: rgba(52, 211, 153, 0.1);
        color: var(--success);
        box-shadow: 0 0 20px rgba(52, 211, 153, 0.2);
    }
    .status-label {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 4px;
    }
    .status-desc {
        font-size: 0.8rem;
        color: var(--subtext);
    }
    .control-btns {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .btn {
        width: 100%;
        padding: 16px;
        border-radius: 16px;
        border: none;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }
    .btn:active { transform: translateY(0); }
    
    .btn-primary { background: var(--primary); color: #1e1b4b; }
    .btn-success { background: var(--success); color: #064e3b; }
    .btn-danger { background: var(--danger); color: #450a0a; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text); }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }

    /* PIN Overlay */
    .overlay {
        display: none; position: fixed; inset: 0; 
        background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px);
        align-items: center; justify-content: center; z-index: 1000;
    }
    .overlay.show { display: flex; }
    .pin-box {
        background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px; padding: 32px; width: 320px; text-align: center;
    }
    .pin-box h3 { margin-bottom: 20px; font-size: 1.1rem; }
    .pin-box input {
        width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px; padding: 16px; color: white; font-size: 1.5rem;
        text-align: center; letter-spacing: 8px; margin-bottom: 16px; outline: none;
    }
    .pin-box input:focus { border-color: var(--primary); }
    .pin-row { display: flex; gap: 12px; }
    .pin-row button { flex: 1; }

    .toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: #1e293b; padding: 12px 24px; border-radius: 100px;
        font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1);
        opacity: 0; transition: 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; bottom: 40px; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛡️ Focus Guard Pro</h1>
        <p>家長遠端簡易控制</p>
        <div class="id-badge" onclick="editID()">🆔 <span id="id-text">載入中...</span></div>
    </div>

    <div class="status-card">
        <div class="status-icon" id="status-icon">🛡️</div>
        <div class="status-label" id="status-label">連線中...</div>
        <div class="status-desc" id="status-desc">正在同步雲端狀態</div>
    </div>

    <div class="control-btns">
        <!-- 核心切換功能 -->
        <button id="main-btn" class="btn btn-primary" onclick="handleToggle()">
            載入中...
        </button>
        
        <!-- 獎勵按鈕 -->
        <button id="reward-btn" class="btn btn-outline" onclick="handleReward()">
            🎁 獎勵 30 分鐘 YouTube
        </button>
        
        <button class="btn btn-outline" style="margin-top:12px; font-size:0.8rem; color:var(--subtext);" onclick="location.href='/control_panel_full.html'">
            ⚙️ 進階功能 (AI 出題/日誌)
        </button>
    </div>
</div>

<!-- PIN Overlay -->
<div class="overlay" id="pinOverlay">
    <div class="pin-box">
        <h3 id="pin-title">🔐 請輸入家長 PIN 碼</h3>
        <input type="password" id="pinInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')submitPin()">
        <div id="pin-err" style="color:var(--danger); font-size:0.8rem; margin-bottom:12px; height:1rem;"></div>
        <div class="pin-row">
            <button class="btn btn-outline" onclick="closePin()">取消</button>
            <button class="btn btn-success" onclick="submitPin()">確認</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let active = false;
    let cloudStatus = "LOCKED";
    let pinAction = "";

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function refresh() {
        try {
            const r = await fetch('/api/status');
            const d = await r.json();
            
            active = d.active;
            cloudStatus = d.cloud_status || "LOCKED";
            document.getElementById('id-text').textContent = d.student_id || '---';

            const icon = document.getElementById('status-icon');
            const label = document.getElementById('status-label');
            const desc = document.getElementById('status-desc');
            const mainBtn = document.getElementById('main-btn');

            if (!active) {
                icon.innerHTML = "💤";
                icon.className = "status-icon";
                label.textContent = "系統未啟動";
                label.style.color = "var(--subtext)";
                desc.textContent = "孩子可以自由使用電腦";
                mainBtn.textContent = "🚀 啟動守護模式";
                mainBtn.className = "btn btn-success";
            } else {
                icon.className = "status-icon active";
                if (cloudStatus === "UNLOCKED") {
                    icon.innerHTML = "🔓";
                    label.textContent = "獎勵解鎖中";
                    label.style.color = "var(--success)";
                    desc.textContent = "孩子目前可以使用 YouTube";
                    mainBtn.textContent = "🔒 恢復攔截";
                    mainBtn.className = "btn btn-primary";
                } else {
                    icon.innerHTML = "🛡️";
                    label.textContent = "守護攔截中";
                    label.style.color = "var(--primary)";
                    desc.textContent = "所有娛樂內容將被攔截";
                    mainBtn.textContent = "🛑 停止守護";
                    mainBtn.className = "btn btn-danger";
                }
            }
        } catch(e) {}
    }

    function handleToggle() {
        if (!active) {
            // 啟動不需要 PIN
            fetch('/api/start', {method:'POST'}).then(r=>r.json()).then(d=>{
                if(d.ok) { showToast('✅ 守護模式已啟動'); refresh(); }
            });
        } else {
            // 停止需要 PIN
            showPin('toggle');
        }
    }

    function handleReward() {
        showPin('reward');
    }

    function showPin(action) {
        pinAction = action;
        document.getElementById('pinInput').value = '';
        document.getElementById('pin-err').textContent = '';
        document.getElementById('pin-title').textContent = action === 'reward' ? '🔐 獎勵解鎖驗證' : '🔐 停止守護驗證';
        document.getElementById('pinOverlay').classList.add('show');
        setTimeout(() => document.getElementById('pinInput').focus(), 100);
    }

    function closePin() { document.getElementById('pinOverlay').classList.remove('show'); }

    function submitPin() {
        const pin = document.getElementById('pinInput').value;
        const url = pinAction === 'reward' ? '/api/add_token' : '/api/stop';
        const body = pinAction === 'reward' ? {pin, count:1, reason:'獎勵解鎖'} : {pin};

        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        }).then(r=>r.json()).then(d => {
            if (d.ok) {
                closePin();
                showToast(pinAction === 'reward' ? '🎁 已發放獎勵' : '🛑 已停止守護');
                refresh();
            } else {
                document.getElementById('pin-err').textContent = 'PIN 碼錯誤';
            }
        });
    }

    function editID() {
        const oldID = document.getElementById('id-text').textContent;
        const newID = prompt('請輸入電腦代號:', oldID);
        if (newID && newID !== oldID) {
            fetch('/api/update_id', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ student_id: newID.trim() })
            }).then(r => r.json()).then(d => {
                if (d.ok) {
                    document.getElementById('id-text').textContent = d.student_id;
                    showToast('✅ 代號已更新');
                }
            });
        }
    }

    refresh();
    setInterval(refresh, 5000);
</script>

</body>
</html>
