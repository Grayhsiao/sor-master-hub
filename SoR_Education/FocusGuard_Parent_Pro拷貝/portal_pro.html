<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Guard Pro | 家長遠端中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --accent: #3b82f6;
            --danger: #f87171;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(74, 222, 128, 0.1) 0, transparent 50%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 { margin: 0; font-size: 1.6rem; font-weight: 700; color: var(--primary); }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        .section { margin-bottom: 2rem; }
        label { display: block; margin-bottom: 0.6rem; font-size: 0.85rem; color: #cbd5e1; font-weight: 600; }
        input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.2); }

        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-primary { background: var(--primary); color: #064e3b; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: #450a0a; }
        .btn:active { transform: scale(0.95); opacity: 0.9; }

        .status-chip {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-align: center;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Focus Guard Pro</h1>
        <div class="subtitle">家長專屬專業控制台</div>
        <div style="margin-bottom: 1.5rem;">
            <a href="FocusGuardPro_Mac.zip" class="btn btn-accent" style="display:block; text-decoration:none; background:#64748b; font-size:0.85rem; padding:10px;">📥 下載學生端 Mac 安裝包 (.zip)</a>
        </div>

        <div class="section">
            <label>🔑 遠端識別代碼 (由學生端提供)</label>
            <input type="text" id="target-id" placeholder="例如: PRO1234">
        </div>

        <div class="section">
            <label>⏱️ 快速專注定時 (分鐘)</label>
            <input type="number" id="focus-mins" value="60" min="1" max="240">
            <div style="margin-top: 10px;">
                <button class="btn btn-primary" style="width: 100%;" onclick="startTimer()">🚀 開始計時鎖定 (60s 緩衝)</button>
            </div>
        </div>

        <div class="section">
            <label>🔒 安全管理</label>
            <div style="display: flex; gap: 8px;">
                <input type="password" id="new-pin" placeholder="設定新 PIN 碼" maxlength="4">
                <button class="btn btn-accent" style="padding: 10px; width: 100px;" onclick="setPin()">更新</button>
            </div>
        </div>

        <div class="btn-stack">
            <button class="btn btn-danger" onclick="sendCommand('HARD_LOCK')">🚫 立即幽默封鎖</button>
            <button class="btn btn-accent" onclick="sendCommand('UNLOCKED')" style="background: #64748b;">✅ 恢復自由模式</button>
        </div>

        <div id="log" class="status-chip">等待連線中...</div>
    </div>

    <script>
        const API_BASE = "https://studybuddy-a2dcc-default-rtdb.asia-southeast1.firebasedatabase.app/";

        function setLog(msg, color="#94a3b8") {
            const el = document.getElementById('log');
            el.innerText = msg;
            el.style.color = color;
        }

        async function sendCommand(status) {
            const id = document.getElementById('target-id').value.trim().toUpperCase();
            if(!id) { alert("請輸入代碼！"); return; }
            
            setLog("指令傳送中...");
            try {
                const r = await fetch(`${API_BASE}/classrooms/${id}.json`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: status, update_at: Date.now() })
                });
                if(r.ok) setLog(`✅ 已成功下達指令：${status}`, "#4ade80");
                else setLog("❌ 傳送失敗", "#f87171");
            } catch(e) { setLog("⚠️ 網路錯誤", "orange"); }
        }

        function startTimer() {
            const mins = document.getElementById('focus-mins').value;
            sendCommand(`TIMER|${mins}`);
        }

        function setPin() {
            const pin = document.getElementById('new-pin').value;
            if(!pin || pin.length < 4) { alert("請輸入 4 位數密碼"); return; }
            sendCommand(`SET_PIN|${pin}`);
        }
    </script>
</body>
</html>
