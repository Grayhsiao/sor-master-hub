<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusGuard | 老師專業控制面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --primary-hover: #22c55e;
            --danger: #f87171;
            --danger-hover: #ef4444;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(74, 222, 128, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(248, 113, 113, 0.05) 0, transparent 50%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 1.1rem;
            color: white;
            box-sizing: border-box;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-group {
            display: grid;
            gap: 12px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-lock {
            background-color: var(--danger);
            box-shadow: 0 4px 14px 0 rgba(248, 113, 113, 0.39);
        }

        .btn-unlock {
            background-color: var(--primary);
            box-shadow: 0 4px 14px 0 rgba(74, 222, 128, 0.39);
        }

        .btn-check {
            background-color: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.85rem;
            padding: 10px;
        }

        .btn-check:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .status-card {
            margin-top: 2rem;
            padding: 12px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            min-height: 20px;
            transition: all 0.3s ease;
        }

        .andy-face {
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.2));
            animation: float 3s ease-in-out infinite;
        }

        .andy-face img {
            width: 120px;
            height: auto;
            border-radius: 20px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .loading-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="andy-face">
            <img src="sor logo.png" alt="SOR Logo">
        </div>
        <h1>FocusGuard</h1>
        <p class="subtitle">Teacher Control Center</p>

        <div class="input-group">
            <label for="class-code">教室代碼 Classroom Code</label>
            <input type="text" id="class-code" placeholder="ENG101" value="TEST101">
        </div>

        <div class="input-group">
            <label for="admin-key">管理員金鑰 Admin Key (選填)</label>
            <input type="password" id="admin-key" placeholder="若有設定規則請輸入">
        </div>

        <div class="btn-group">
            <button class="btn-lock" onclick="updateStatus('LOCKED')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                啟動鎖定 開始上課
            </button>
            <button class="btn-unlock" onclick="updateStatus('UNLOCKED')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                </svg>
                解除鎖定 結束課程
            </button>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0; width: 100%;">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="broadcast-msg" placeholder="輸入要對全班說的話..."
                    style="font-size: 0.9rem; padding: 10px; width: 70%;" maxlength="20">
                <button onclick="sendBroadcast()"
                    style="background: #3b82f6; width: 30%; padding: 10px; font-size: 0.9rem;">📢 廣播</button>
            </div>
            <button onclick="sendCoins()"
                style="background: #eab308; color: #451a03; box-shadow: 0 4px 14px 0 rgba(234, 179, 8, 0.39);">
                💰 獎勵全班 50 安迪幣
            </button>
            <button class="btn-check" onclick="checkConnection()">
                🔍 測試資料庫連線
            </button>
        </div>

        <div id="status" class="status-card">
            系統準備就緒
        </div>

        <div style="margin-top: 2rem; text-align: left;">
            <h3
                style="font-size: 1rem; color: var(--text-muted); border-bottom: 1px solid var(--glass-border); padding-bottom: 8px; margin-bottom: 10px;">
                👨‍🎓 在線學生點名簿</h3>
            <div id="student-list">
                <p style="font-size: 0.85rem; color: gray;">等待學生加入中...</p>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_BASE = "https://studybuddy-a2dcc-default-rtdb.asia-southeast1.firebasedatabase.app".replace(/\/$/, "");

        function setStatus(msg, color = null) {
            const el = document.getElementById('status');
            el.innerText = msg;
            if (color) el.style.color = color;
            else el.style.color = 'var(--text-muted)';
        }

        async function checkConnection() {
            const code = document.getElementById('class-code').value.trim().toUpperCase();
            if (!code) { alert("請輸入教室代碼"); return; }
            const url = `${FIREBASE_BASE}/classrooms/${code}.json`;
            setStatus("正在診斷連線...");

            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    setStatus(`✅ 連線正常 (目前: ${data?.status || '無資料'})`, 'var(--primary)');
                } else {
                    setStatus(`❌ 錯誤: ${response.status}`, 'var(--danger)');
                }
            } catch (err) {
                setStatus(`⚠️ 網路阻斷: ${err.message}`, 'orange');
            }
        }

        async function updateStatus(status) {
            const code = document.getElementById('class-code').value.trim().toUpperCase();
            const adminKey = document.getElementById('admin-key').value.trim();
            if (!code) { alert("請輸入教室代碼"); return; }

            const url = `${FIREBASE_BASE}/classrooms/${code}.json`;
            const btnText = status === 'LOCKED' ? '鎖定' : '解鎖';
            setStatus(`指令發送中...`);

            try {
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        status: status,
                        admin_key: adminKey, // 發送金鑰供 Rules 校驗
                        last_update: new Date().toISOString(),
                        client: "TeacherDashboardV2"
                    })
                });

                if (response.ok) {
                    setStatus(`✅ 已發送${btnText}指令！`, status === 'LOCKED' ? 'var(--danger)' : 'var(--primary)');
                } else {
                    setStatus(`❌ 權限不足或錯誤 (HTTP ${response.status})`, 'var(--danger)');
                }
            } catch (err) {
                setStatus(`⚠️ 通訊中斷`, 'orange');
                console.error(err);
            }
        }

        async function sendEvent(type, payloadText, targetId = 'ALL', targetName = '全班') {
            const code = document.getElementById('class-code').value.trim().toUpperCase();
            if (!code) { alert("請輸入教室代碼"); return; }

            setStatus(`發送給 ${targetName} 中...`);
            const url = `${FIREBASE_BASE}/classrooms/${code}.json`;
            try {
                // 發送一個帶有時間戳的事件，確保每次傳送的值不同，學生端才會觸發變更
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        last_event: {
                            type: type,
                            payload: payloadText,
                            target: targetId,
                            targetDisplay: targetName,
                            timestamp: Date.now()
                        }
                    })
                });
                if (response.ok) {
                    setStatus(`✅ 已向 ${targetName} 發送: ${payloadText}`, 'var(--primary)');
                } else {
                    setStatus(`❌ 發送失敗`, 'var(--danger)');
                }
            } catch (err) {
                setStatus(`⚠️ 通訊中斷`, 'orange');
            }
        }

        function sendBroadcast() {
            const msg = document.getElementById('broadcast-msg').value.trim();
            if (!msg) { alert("請輸入廣播訊息！"); return; }
            sendEvent('MESSAGE', msg, 'ALL', '全班');
            document.getElementById('broadcast-msg').value = ''; // 清空輸入框
        }

        function sendCoins() {
            if (confirm("確定要發給全班 50 安迪幣嗎？")) {
                sendEvent('COIN', '獲得 50 安迪幣！', 'ALL', '全班');
            }
        }

        // --- 學生名單輪詢 ---
        setInterval(fetchStudents, 3000); // 每 3 秒抓一次名單

        async function fetchStudents() {
            const code = document.getElementById('class-code').value.trim().toUpperCase();
            if (!code) return;
            try {
                const res = await fetch(`${FIREBASE_BASE}/classrooms/${code}/students.json`);
                if (res.ok) {
                    const students = await res.json();
                    renderStudents(students);
                }
            } catch (e) { }
        }

        function renderStudents(students) {
            const listEl = document.getElementById('student-list');
            if (!students) {
                listEl.innerHTML = '<p style="font-size: 0.85rem; color: gray;">目前沒有學生在線</p>';
                return;
            }

            let html = '';
            const now = Date.now() / 1000;
            // 將學生依點數排序
            const sortedStudents = Object.entries(students).sort((a, b) => (b[1].coins || 0) - (a[1].coins || 0));

            for (const [id, data] of sortedStudents) {
                // 如果超過 10 分鐘沒更新，視為離線
                const isOffline = (now - data.last_active) > 600;
                const opacity = isOffline ? '0.5' : '1';
                const statusDot = isOffline ? '🔴' : '🟢';

                html += `
                <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); margin-bottom: 8px; padding: 10px; border-radius: 8px; opacity: ${opacity};">
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-weight: 600; font-size: 0.95rem;">${statusDot} ${data.name}</span>
                        <span style="font-size: 0.8rem; color: #eab308; margin-top: 2px;">💰 ${data.coins || 0}</span>
                    </div>
                    <button onclick="sendEvent('COIN', '獲得 50 安迪幣！', '${id}', '${data.name}')" style="background: #eab308; color: #451a03; padding: 6px 14px; font-size: 0.85rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(234, 179, 8, 0.2);">
                        +50
                    </button>
                </div>
                `;
            }
            listEl.innerHTML = html;
        }
    </script>
</body>

</html>
