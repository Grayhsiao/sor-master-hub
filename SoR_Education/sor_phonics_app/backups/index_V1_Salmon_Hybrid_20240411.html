<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoR 腦科學拼讀音典</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v5-salmon:  #ff7f50; /* 鮭魚重點色 */
            --v5-peach:   #fff9f5; /* 暖色背景 */
            --sor-red:    #ff4757; /* 母音紅 */
            --sor-dark:   #2d3436;
            --border:     #f1e1d6;
            --info-col:   240px;
            --shadow:     0 8px 24px rgba(255, 127, 80, 0.08);
            --radius:     20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--v5-peach);
            color: var(--sor-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ─── 頂部固定列 ─── */
        #nav-header {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(255, 250, 245, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--border);
            padding: 20px 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--v5-salmon);
            letter-spacing: -0.5px;
        }

        /* ─── 7 步驟頁籤 ─── */
        #step-tabs {
            display: flex;
            gap: 8px;
            background: #fdf1e8;
            padding: 6px;
            border-radius: 50px;
            overflow-x: auto;
            max-width: 95vw;
        }

        .tab-btn {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            color: #b08d7a;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--v5-salmon);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 127, 80, 0.3);
        }

        /* ─── 搜尋區 ─── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 900px;
        }

        #word-search {
            flex: 1;
            min-width: 250px;
            padding: 14px 24px;
            border-radius: 40px;
            border: 2px solid var(--border);
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        #word-search:focus { border-color: var(--v5-salmon); }

        .radio-group {
            display: flex;
            gap: 8px;
        }
        .radio-group label {
            padding: 10px 18px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: white;
            font-size: 0.9rem;
            font-weight: 700;
            color: #8d7a71;
            cursor: pointer;
        }
        .radio-group input:checked + span, 
        .radio-group label:has(input:checked) {
            background: #fff0eb;
            color: var(--v5-salmon);
            border-color: var(--v5-salmon);
        }

        /* ─── 多欄拼圖容器 ─── */
        #app-container {
            width: 95%;
            max-width: 1200px;
            padding: 30px 0 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); /* 多欄網格 */
            gap: 24px;
        }

        /* ─── 單字卡 ─── */
        .dictionary-card {
            background: white;
            border: 2px solid transparent;
            border-radius: var(--radius);
            display: grid;
            grid-template-columns: var(--info-col) 1fr;
            min-height: 220px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }
        .dictionary-card:hover {
            transform: translateY(-6px);
            border-color: var(--v5-salmon);
        }

        .left-info {
            padding: 30px;
            border-right: 1px dashed var(--border);
            background: #fffcf9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .word-title {
            font-size: 42px;
            font-weight: 900;
            color: var(--sor-dark);
            line-height: 1;
        }

        .info-kk {
            font-family: serif;
            font-size: 1.15rem;
            color: var(--v5-salmon);
        }

        .info-zh {
            font-size: 0.95rem;
            color: #8d7a71;
            line-height: 1.5;
            font-weight: 600;
        }

        .card-footer {
            display: flex; gap: 8px; margin-top: 10px;
        }

        .action-btn {
            background: #fff0eb;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--v5-salmon);
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: var(--v5-salmon);
            color: white;
        }

        .right-sor {
            padding: 30px 20px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .sor-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .letter-text {
            font-size: 3.2rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        .vowel-red { color: var(--sor-red); }
        .text-bw   { color: var(--sor-dark); }

        .symbol-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .symbol-img.hidden { opacity: 0; pointer-events: none; }
        .syl-gap { width: 14px; }

        @media (max-width: 1000px) {
            #app-container { grid-template-columns: 1fr; }
        }

        /* ─── 進場動畫 ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .dictionary-card {
            animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .dictionary-card:nth-child(1)  { animation-delay: 0.00s; }
        .dictionary-card:nth-child(2)  { animation-delay: 0.04s; }
        .dictionary-card:nth-child(3)  { animation-delay: 0.08s; }
        .dictionary-card:nth-child(4)  { animation-delay: 0.12s; }
        .dictionary-card:nth-child(5)  { animation-delay: 0.16s; }
        .dictionary-card:nth-child(n+6){ animation-delay: 0.20s; }

        /* ─── 空狀態 ─── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            :root { --info-col: 160px; }
            .word-title { font-size: 28px; }
            .letter-text { font-size: 2.8rem; }
            .symbol-img { width: 52px; height: 52px; }
        }
    </style>
</head>
<body>

<div id="nav-header">
    <div class="header-branding">
        <div class="brand-dot"></div>
        <div>
            <h1>SoR 腦科學拼讀音典</h1>
            <div class="brand-sub">Science of Reading · Digital Flagship</div>
        </div>
    </div>

    <div id="step-tabs"></div>

    <div class="controls">
        <div class="search-wrap">
            <input type="text" id="word-search" placeholder="搜尋單字 (例如: bed, cat, help...)" oninput="onSearch()">
        </div>
        <div class="radio-group">
            <label><input type="radio" name="sort" value="sor" checked onchange="changeSort('sor')"><span>音典順序</span></label>
            <label><input type="radio" name="sort" value="700" onchange="changeSort('700')"><span>700單順序</span></label>
        </div>
        <select id="chapter-select" onchange="changeChapter()">
            <option value="">── 所有章節 ──</option>
        </select>
    </div>
</div>

<div id="app-container">
    <div class="empty-state">載入中…</div>
</div>

<script>
    const API_BASE = window.location.origin;

    let currentStep = 1;
    let currentSort = 'sor';
    let currentChapter = '';
    let wordMap = {};
    let filteredWords = [];
    let searchTimer = null;

    const STEP_NAMES = [
        '母音定錨', '二拼進場', '聲音完成',
        '音形連結', '音標退場', '黑白連結', '實戰閱讀'
    ];

    // ─── 初始化頁籤 ───────────────────────────────────────
    function initTabs() {
        const tabs = document.getElementById('step-tabs');
        STEP_NAMES.forEach((name, i) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
            btn.textContent = `${i+1}. ${name}`;
            btn.onclick = () => goToStep(i + 1);
            tabs.appendChild(btn);
        });
    }

    function goToStep(step) {
        currentStep = step;
        document.querySelectorAll('.tab-btn').forEach((b, i) =>
            b.classList.toggle('active', i + 1 === step)
        );
        render();
    }

    // ─── 資料載入 ────────────────────────────────────────
    async function loadWords(q = '') {
        const url = `${API_BASE}/api/words?sort=${currentSort}&q=${encodeURIComponent(q)}&chapter=${encodeURIComponent(currentChapter)}&limit=100`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            filteredWords = data.words || [];
            wordMap = {};
            filteredWords.forEach(w => { wordMap[w.sor_id] = w; });
            render();
        } catch (e) {
            document.getElementById('app-container').innerHTML =
                `<div class="empty-state">❌ 無法連線 API，請確認 server.py 已啟動</div>`;
        }
    }

    async function loadChapters() {
        try {
            const res = await fetch(`${API_BASE}/api/chapters`);
            const data = await res.json();
            const sel = document.getElementById('chapter-select');
            const chapters = data.chapters || data;
            if (Array.isArray(chapters)) {
                chapters.forEach(ch => {
                    const opt = document.createElement('option');
                    if (typeof ch === 'object') {
                        opt.value = ch.chapter_700 || ch;
                        opt.textContent = `${ch.chapter_700} ${ch.chapter_name_700 || ''} (${ch.word_count || ''})`;
                    } else { opt.value = ch; opt.textContent = ch; }
                    sel.appendChild(opt);
                });
            }
        } catch(e) { console.warn('章節載入失敗', e); }
    }

    function onSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            loadWords(document.getElementById('word-search').value.trim());
        }, 300);
    }

    function changeSort(val) {
        currentSort = val;
        currentChapter = '';
        document.getElementById('chapter-select').style.display = val === '700' ? 'inline-block' : 'none';
        if (val === '700') loadChapters();
        loadWords(document.getElementById('word-search').value.trim());
    }

    function changeChapter() {
        currentChapter = document.getElementById('chapter-select').value;
        loadWords(document.getElementById('word-search').value.trim());
    }

    // ─── 渲染卡片 ─────────────────────────────────────────
    function render() {
        const container = document.getElementById('app-container');
        if (!filteredWords.length) {
            container.innerHTML = '<div class="empty-state">😔 查無結果，試試其他搜尋詞</div>';
            return;
        }
        container.innerHTML = filteredWords.map(item => {
            const word = (item.word || '').trim();
            const kk   = (item.kk || '').trim();
            const zh   = (item.trans_zh || item.chinese_pub || '').trim();
            return `
            <div class="dictionary-card">
                <div class="left-info">
                    <div class="word-title">${word}</div>
                    <div class="info-kk">${kk}</div>
                    <div class="info-zh">${zh}</div>
                    <div class="card-footer">
                        <button class="action-btn" onclick="speak(${item.sor_id},0.6)">🚲 慢慢聽</button>
                        <button class="action-btn" onclick="speak(${item.sor_id},1)">🚗 快快聽</button>
                    </div>
                </div>
                <div class="right-sor">
                    ${renderStep(currentStep, item)}
                </div>
            </div>`;
        }).join('');
    }

    // ══════════════════════════════════════════════════════
    //  SoR 七步驟核心渲染 (V1 邏輯，完全不動)
    // ══════════════════════════════════════════════════════
    function renderStep(step, item) {
        const word  = (item.word || '').trim();
        const minum = item.minum;
        if (!minum || !Array.isArray(minum)) return `<span style="color:#ccc">無標注</span>`;

        // V1 做法：把所有音標碼攤平成一個陣列
        const syllables = Array.isArray(minum[0]) ? minum[0] : minum;
        const codes = syllables.flat(2).map(Number);

        // 找母音位置 (44~55 為母音代碼)
        const vIdx = codes.findIndex(c => c >= 44 && c <= 55);
        if (vIdx === -1) {
            // 沒有母音，直接顯示全部音標
            return `<div class="sor-row">${codes.map(c =>
                `<img src="${API_BASE}/assets/images/${c}.png" class="symbol-img">`
            ).join('')}</div>`;
        }

        // 三塊音標
        const onC = codes.slice(0, vIdx);   // 頭子音
        const vC  = codes[vIdx];             // 母音
        const coC = codes.slice(vIdx + 1);   // 尾子音

        // 對應三塊字母 (V1 原始邏輯)
        const onL = word.substring(0, onC.length);
        const vL  = word.substring(onC.length, onC.length + 1);
        const coL = word.substring(onC.length + 1);

        // ── 字母排 (Step 4~7) ──
        const showLetters = step >= 4;
        let letterRow = '';
        if (showLetters) {
            const isBW = step >= 6;
            if (step === 7) {
                // 步驟 7：整個單字合在一起，全黑
                letterRow = `<div class="sor-row">
                    <span class="letter-text text-bw">${word}</span>
                </div>`;
            } else {
                // 步驟 4, 5, 6：分成三段顯示
                letterRow = `<div class="sor-row">
                    <span class="letter-text ${isBW ? 'text-bw' : ''}">${onL}</span>
                    <span class="letter-text ${isBW ? 'text-bw' : 'vowel-red'}">${vL}</span>
                    <span class="letter-text ${isBW ? 'text-bw' : ''}">${coL}</span>
                </div>`;
            }
        }

        // ── 音標排 (Step 1~4) ──
        const showSymbols = step <= 4;
        let symbolRow = '';
        if (showSymbols) {
            // 頭子音：Step 1 隱藏，Step 2+ 顯示
            const onImgs = onC.map(id =>
                `<img src="${API_BASE}/assets/images/${id}.png"
                     class="symbol-img ${step < 2 ? 'hidden' : ''}"
                     onerror="this.style.opacity='0'">`
            ).join('');

            // 母音：永遠顯示（保持圖片原色）
            const vImg = `<img src="${API_BASE}/assets/images/${vC}.png"
                              class="symbol-img vowel-symbol"
                              onerror="this.style.opacity='0'">`;

            // 尾子音：Step 1, 2 隱藏，Step 3+ 顯示
            const coImgs = coC.map(id =>
                `<img src="${API_BASE}/assets/images/${id}.png"
                     class="symbol-img ${step < 3 ? 'hidden' : ''}"
                     onerror="this.style.opacity='0'">`
            ).join('');

            symbolRow = `<div class="sor-row">
                <div style="display:flex;gap:4px;justify-content:flex-end">${onImgs}</div>
                <div style="display:flex;gap:4px;justify-content:center">${vImg}</div>
                <div style="display:flex;gap:4px;justify-content:flex-start">${coImgs}</div>
            </div>`;
        }

        return letterRow + symbolRow;
    }
    // ══════════════════════════════════════════════════════

    // ─── 語音播放 ─────────────────────────────────────────
    function speak(sorId, rate = 1) {
        const item = wordMap[sorId];
        if (!item) return;
        if (item.audio_file) {
            const a = new Audio(`${API_BASE}/api/audio/${encodeURIComponent(item.audio_file)}`);
            a.playbackRate = rate;
            a.play().catch(() => synth(item.word, rate));
        } else {
            synth(item.word, rate);
        }
    }

    function synth(text, rate) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = rate;
        window.speechSynthesis.speak(u);
    }

    function triggerSfx(code) { console.log('sfx:', code); }

    // ─── 啟動 ─────────────────────────────────────────────
    initTabs();
    loadWords();
</script>
</body>
</html>
