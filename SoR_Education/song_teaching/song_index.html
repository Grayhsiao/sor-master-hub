<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 SoR 英文歌詞教材系統</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d14;
  --card: #16161f;
  --border: #2a2a3a;
  --accent: #e8896a;
  --accent2: #4aabdb;
  --gold: #f1c40f;
  --text: #e8e6e0;
  --muted: #888;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 60px;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #1a0a05 0%, #0d0d14 60%);
  border-bottom: 1px solid var(--border);
  padding: 40px 24px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(232,137,106,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.header h1 {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), #f5b895);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.header p { color: var(--muted); font-size: 0.95em; }
.header .badge {
  display: inline-block; margin-top: 10px;
  background: rgba(232,137,106,0.15); border: 1px solid rgba(232,137,106,0.3);
  color: var(--accent); padding: 4px 14px; border-radius: 20px; font-size: 0.78em; font-weight: 700;
}

/* ── MAIN LAYOUT ── */
.main { max-width: 960px; margin: 0 auto; padding: 32px 20px 0; }

/* ── GENERATE CARD ── */
.gen-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  margin-bottom: 36px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.gen-card::before {
  content: '🎵';
  position: absolute; right: 24px; top: 20px;
  font-size: 5rem; opacity: 0.06; pointer-events: none;
}
.gen-card h2 { font-size: 1.1em; font-weight: 700; margin-bottom: 18px; color: var(--accent); }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 560px) { .input-row { grid-template-columns: 1fr; } }

.input-group label { display: block; font-size: 0.78em; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.input-group input {
  width: 100%; background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 1em; padding: 10px 14px;
  border-radius: 10px; outline: none; transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--accent); }
.input-group input::placeholder { color: #444; }

.gen-btn {
  width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), #d05e3a);
  color: white; font-family: inherit; font-size: 1.05em; font-weight: 700;
  box-shadow: 0 4px 20px rgba(232,137,106,0.35);
  transition: all 0.2s; letter-spacing: .3px;
}
.gen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(232,137,106,0.45); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── PROGRESS ── */
.progress-box {
  display: none;
  margin-top: 18px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  max-height: 180px;
  overflow-y: auto;
}
.progress-box.show { display: block; }
.plog-line { font-size: 0.82em; color: #aaa; padding: 2px 0; font-family: monospace; }
.plog-line.done { color: #2ecc71; }
.plog-line.error { color: #e74c3c; }

/* ── SECTION TITLE ── */
.section-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.85em; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .6px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* ── WORKSHEET GRID ── */
.ws-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}

.ws-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.ws-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 6px 24px rgba(232,137,106,0.12); }
.ws-card .ws-icon { font-size: 2.2rem; margin-bottom: 10px; display: block; }
.ws-card .ws-title { font-weight: 900; font-size: 1.05em; margin-bottom: 3px; line-height: 1.3; }
.ws-card .ws-artist { font-size: 0.82em; color: var(--muted); margin-bottom: 10px; }
.ws-card .ws-date { font-size: 0.75em; color: #555; margin-bottom: 14px; }

.ws-card .ws-actions { display: flex; gap: 8px; }
.ws-btn {
  flex: 1; padding: 7px 10px; border-radius: 7px; border: none; cursor: pointer;
  font-family: inherit; font-size: 0.82em; font-weight: 700; transition: 0.15s;
}
.ws-btn.open { background: linear-gradient(135deg, var(--accent), #d05e3a); color: white; }
.ws-btn.open:hover { opacity: 0.88; }
.ws-btn.print { background: rgba(74,171,219,0.12); color: var(--accent2); border: 1px solid rgba(74,171,219,0.25); }
.ws-btn.print:hover { background: rgba(74,171,219,0.22); }
.ws-btn.del { background: rgba(231,76,60,0.08); color: #e74c3c; border: 1px solid rgba(231,76,60,0.2); flex: 0; padding: 7px 12px; }
.ws-btn.del:hover { background: rgba(231,76,60,0.18); }

.empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.95em; }
.empty-state .em-icon { font-size: 3rem; margin-bottom: 10px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 30px; right: 24px;
  background: #2ecc71; color: white; padding: 10px 20px;
  border-radius: 8px; font-weight: 700; font-size: 0.9em;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transform: translateY(80px); opacity: 0; transition: all 0.3s;
  z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: #e74c3c; }
</style>
</head>
<body>

<div class="header">
  <h1>🎵 SoR 英文歌詞教材系統</h1>
  <p>Science of Reading · Song Teaching Worksheet Generator</p>
  <div class="badge">AI-Powered · Print-Ready · SoR 專利音標整合</div>
</div>

<div class="main">

  <!-- 生成卡片 -->
  <div class="gen-card">
    <h2>🎤 生成新教材</h2>
    <div class="input-row">
      <div class="input-group">
        <label>歌名 Song Title</label>
        <input type="text" id="song-input" placeholder="e.g. Last Christmas" />
      </div>
      <div class="input-group">
        <label>歌手 Artist</label>
        <input type="text" id="artist-input" placeholder="e.g. Wham!" />
      </div>
    </div>
    <button class="gen-btn" id="gen-btn" onclick="startGenerate()">
      🚀 開始生成教材
    </button>
    <div class="progress-box" id="progress-box">
      <div id="progress-log"></div>
    </div>
  </div>

  <!-- 歷史紀錄 -->
  <div class="section-title">
    <div class="dot"></div>
    已生成的教材 Generated Worksheets
  </div>
  <div id="ws-list" class="ws-grid">
    <div class="empty-state">
      <div class="em-icon">📂</div>
      <div>尚無教材，試著生成一首吧！</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const BASE = '';
let currentJobId = null;
let pollInterval = null;

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3500);
}

async function startGenerate() {
  const song = document.getElementById('song-input').value.trim();
  const artist = document.getElementById('artist-input').value.trim();
  if (!song) { showToast('請輸入歌名！', true); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';

  const pb = document.getElementById('progress-box');
  pb.classList.add('show');
  document.getElementById('progress-log').innerHTML = '';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({song, artist})
    });
    const data = await res.json();
    if (data.error) { showToast(data.error, true); resetBtn(); return; }
    currentJobId = data.job_id;
    addLog('🚀 任務啟動，請稍候... (需 2-5 分鐘)');
    pollInterval = setInterval(pollProgress, 2500);
  } catch(e) {
    showToast('連線失敗', true); resetBtn();
  }
}

async function pollProgress() {
  if (!currentJobId) return;
  try {
    const res = await fetch(`/progress/${currentJobId}`);
    const data = await res.json();
    const log = document.getElementById('progress-log');
    log.innerHTML = data.log.map(l => `<div class="plog-line">${l}</div>`).join('');
    log.scrollTop = log.scrollHeight;

    if (data.status === 'done') {
      clearInterval(pollInterval);
      const last = log.lastElementChild;
      if (last) last.classList.add('done');
      showToast('✅ 教材生成完成！');
      resetBtn();
      loadWorksheets();
    } else if (data.status === 'error') {
      clearInterval(pollInterval);
      const last = log.lastElementChild;
      if (last) last.classList.add('error');
      showToast('❌ 生成失敗，請重試', true);
      resetBtn();
    }
  } catch(e) {}
}

function addLog(msg) {
  const log = document.getElementById('progress-log');
  const d = document.createElement('div');
  d.className = 'plog-line'; d.textContent = msg;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}

function resetBtn() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = false; btn.textContent = '🚀 開始生成教材';
}

async function loadWorksheets() {
  const res = await fetch('/api/worksheets');
  const items = await res.json();
  const container = document.getElementById('ws-list');
  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><div class="em-icon">📂</div><div>尚無教材，試著生成一首吧！</div></div>`;
    return;
  }
  container.innerHTML = items.map(item => `
    <div class="ws-card" id="card-${item.file}">
      <span class="ws-icon">🎵</span>
      <div class="ws-title">${item.title}</div>
      <div class="ws-artist">by ${item.artist}</div>
      <div class="ws-date">📅 ${item.created}</div>
      <div class="ws-actions">
        <button class="ws-btn open" onclick="window.open('/worksheets/${item.file}','_blank')">📄 開啟</button>
        <button class="ws-btn print" onclick="printWS('${item.file}')">🖨 列印</button>
        <button class="ws-btn del" onclick="deleteWS('${item.file}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function printWS(file) {
  const w = window.open(`/worksheets/${file}`, '_blank');
  w.onload = () => w.print();
}

async function deleteWS(file) {
  if (!confirm('確定刪除這份教材？')) return;
  await fetch(`/api/delete/${file}`, {method: 'DELETE'});
  loadWorksheets();
  showToast('已刪除');
}

// 按 Enter 觸發生成
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (document.activeElement.id === 'song-input' || document.activeElement.id === 'artist-input')) {
    startGenerate();
  }
});

loadWorksheets();
</script>
</body>
</html>
